<!DOCTYPE html>
<html lang="en" data-theme="normal">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROBOART | B2C Smart Store & Product Catalog</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Main Style Sheet -->
    <link rel="stylesheet" href="style.css">
    <!-- Firebase Service Integration -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-check-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <script src="firebase-service.js"></script>
    <script src="components.js"></script>
    <style>
        /* B2C Dynamic Segment Control Selector */
        .b2c-selector-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 40px auto 20px;
            max-width: 800px;
            text-align: center;
        }

        .b2c-option-toggle {
            display: flex;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            padding: 6px;
            border-radius: 50px;
            box-shadow: var(--shadow-md);
            position: relative;
            width: 100%;
            max-width: 600px;
            margin-top: 16px;
        }

        .b2c-toggle-btn {
            flex: 1;
            padding: 14px 20px;
            border: none;
            background: transparent;
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            font-size: 14px;
            color: var(--text-muted);
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            z-index: 2;
        }

        .b2c-toggle-btn.active {
            color: #ffffff !important;
            background: var(--primary);
            box-shadow: 0 4px 15px rgba(var(--primary-rgb), 0.3);
        }

        [data-theme="neon"] .b2c-toggle-btn.active {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.4);
        }

        .b2c-option-desc {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 12px;
            max-width: 500px;
            height: 36px;
            transition: all 0.3s ease;
        }

        /* 8 Categories Grid Setup */
        .b2c-store-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 24px;
            margin-top: 30px;
            margin-bottom: 60px;
        }

        @media (max-width: 1200px) {
            .b2c-store-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (max-width: 900px) {
            .b2c-store-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 600px) {
            .b2c-store-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Premium Product Card Graphic Styling */
        .b2c-prod-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 20px;
            box-shadow: var(--shadow-sm);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        .b2c-prod-card:hover {
            transform: translateY(-8px);
            border-color: var(--primary);
            box-shadow: var(--shadow-lg);
        }

        .b2c-prod-badge {
            position: absolute;
            top: 15px;
            left: 15px;
            font-size: 9px;
            font-weight: bold;
            padding: 4px 10px;
            border-radius: 50px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            z-index: 3;
        }

        .b2c-prod-category-tag {
            font-size: 10px;
            text-transform: uppercase;
            font-weight: 800;
            color: var(--secondary);
            letter-spacing: 1px;
            margin-bottom: 6px;
            margin-top: 16px;
        }

        .b2c-prod-title {
            font-size: 17px;
            font-weight: bold;
            color: var(--text-color);
            margin-bottom: 10px;
            font-family: 'Space Grotesk', sans-serif;
            line-height: 1.3;
        }

        /* High-tech Canvas/SVG Product Illustrations */
        .b2c-prod-visual {
            height: 120px;
            background: linear-gradient(135deg, rgba(var(--primary-rgb), 0.02), rgba(var(--secondary-rgb), 0.05));
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            margin-bottom: 12px;
            border: 1px dashed var(--card-border);
            transition: all 0.3s ease;
        }

        .b2c-prod-visual i {
            font-size: 42px;
            color: var(--primary);
            filter: drop-shadow(0 4px 8px rgba(var(--primary-rgb), 0.2));
            transition: all 0.3s ease;
        }

        .b2c-prod-card:hover .b2c-prod-visual i {
            transform: scale(1.1) rotate(5deg);
        }

        .b2c-prod-desc {
            font-size: 12px;
            color: var(--text-muted);
            line-height: 1.4;
            margin-bottom: 16px;
            flex-grow: 1;
        }

        /* Premium Dynamic Specs Meter */
        .b2c-spec-meter-box {
            background: rgba(var(--primary-rgb), 0.02);
            border: 1px solid var(--card-border);
            border-radius: 6px;
            padding: 10px;
            margin-bottom: 16px;
            font-size: 11px;
        }

        .b2c-spec-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 4px;
            color: var(--text-muted);
        }

        .b2c-spec-row strong {
            color: var(--text-color);
        }

        .b2c-price-box {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: auto;
            border-top: 1px solid var(--card-border);
            padding-top: 14px;
        }

        .b2c-price {
            font-size: 19px;
            font-weight: 800;
            color: var(--text-color);
            font-family: 'Space Grotesk', sans-serif;
        }

        .b2c-price-subtext {
            font-size: 9px;
            color: var(--text-muted);
            display: block;
        }

        .b2c-btn-buy {
            font-size: 11px;
            padding: 8px 14px;
            border-radius: 6px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            box-shadow: var(--shadow-sm);
        }
    </style>
</head>
<body class="ecom-body">

    <!-- Web Component Header -->
    <aura-header active="b2c-store"></aura-header>

    <div class="container" style="margin-top: 100px; padding-bottom: 60px;">
        
        <!-- Welcome intro section -->
        <div class="b2c-selector-container">
            <span class="section-tag" style="background: rgba(var(--primary-rgb), 0.1); color: var(--primary); padding: 4px 12px; border-radius: 50px; font-size: 11px; font-weight: bold; text-transform: uppercase;">Industrial Transformer Store</span>
            <h2 class="section-title" style="margin-top: 10px; font-size: 32px; font-family: 'Space Grotesk', sans-serif;">Dynamic Transformer Catalog</h2>
            <p class="section-desc" style="max-width: 600px; font-size: 14px; color: var(--text-muted); margin-top: 8px;">Explore our premium transformer technologies designed for reliable performance and electrical isolation.</p>
            
            <!-- The Two Option Toggle Switchers at the top -->
            <div class="b2c-option-toggle">
                <button type="button" class="b2c-toggle-btn active" id="btn-opt-tubular">
                    <i class="fa-solid fa-bolt"></i> Control & Step Down
                </button>
                <button type="button" class="b2c-toggle-btn" id="btn-opt-lithium">
                    <i class="fa-solid fa-shield-halved"></i> Isolation & Three Phase
                </button>
            </div>
            
            <!-- Description that updates dynamically -->
            <div class="b2c-option-desc" id="toggle-desc-label">
                Control and Step Down transformers built for automation, CNC machines, and standard industrial reduction.
            </div>
        </div>

        <!-- 8 Products Categories Dynamic Grid -->
        <div class="b2c-store-grid" id="b2c-catalog-grid">
            <!-- Dynamic product cards render here -->
        </div>

    </div>

    <!-- Web Component Footer -->
    <aura-footer></aura-footer>

    <!-- Scripts for dynamic catalog render -->
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            // Theme setup
            const htmlElement = document.documentElement;
            const themeToggle = document.getElementById("theme-toggle");
            
            const savedTheme = localStorage.getItem("aura-theme") || "normal";
            htmlElement.setAttribute("data-theme", savedTheme);
            updateThemeIcon(savedTheme);

            themeToggle.addEventListener("click", () => {
                const currentTheme = htmlElement.getAttribute("data-theme");
                const newTheme = currentTheme === "normal" ? "neon" : "normal";
                
                htmlElement.setAttribute("data-theme", newTheme);
                localStorage.setItem("aura-theme", newTheme);
                updateThemeIcon(newTheme);
            });

            function updateThemeIcon(theme) {
                const icon = themeToggle.querySelector("i");
                if (theme === "neon") {
                    icon.className = "fa-solid fa-sun";
                } else {
                    icon.className = "fa-solid fa-moon";
                }
            }

            // Quick Sidebar / Admin navigation logic
            const adminTriggerBtn = document.getElementById("admin-trigger-btn");
            if (adminTriggerBtn) {
                adminTriggerBtn.addEventListener("click", () => {
                    window.location.href = "admin.html";
                });
            }
            const userLoginBtn = document.getElementById("user-login-btn");
            if (userLoginBtn) {
                userLoginBtn.addEventListener("click", () => {
                    window.location.href = "customer-login.html";
                });
            }

            // Transformer database matching Option 1 (Control/Step Down) vs Option 2 (Isolation/Three Phase)
            const defaultDb = {
                tubular: [
                    {
                        category: "Control Transformers",
                        title: "ROBOART Control Auto Transformer 500VA",
                        desc: "High efficiency control transformer tailored for automation panels and CNC machines.",
                        badge: "Automation Core",
                        badgeBg: "rgba(34, 197, 94, 0.1)",
                        badgeColor: "#22c55e",
                        icon: "fa-solid fa-bolt",
                        autonomy: "500VA Rating",
                        efficiency: "High Efficiency Copper",
                        lifespan: "10+ Years",
                        price: 5499
                    },
                    {
                        category: "Control Transformers",
                        title: "ROBOART Control Auto Transformer 5KVA",
                        desc: "Heavy duty control transformer for large scale industrial robotics and panel drives.",
                        badge: "Heavy Duty Automation",
                        badgeBg: "rgba(59, 130, 246, 0.1)",
                        badgeColor: "#3b82f6",
                        icon: "fa-solid fa-robot",
                        autonomy: "5KVA Rating",
                        efficiency: "Low Temp Rise",
                        lifespan: "10+ Years",
                        price: 25999
                    },
                    {
                        category: "Step Down Transformers",
                        title: "ROBOART Step Down 1KVA Single Phase",
                        desc: "Compact voltage step-down transformer for imported machinery compatibility.",
                        badge: "Voltage Reduction",
                        badgeBg: "rgba(168, 85, 247, 0.1)",
                        badgeColor: "#a855f7",
                        icon: "fa-solid fa-arrow-down-up-across-line",
                        autonomy: "1KVA Rating",
                        efficiency: "90% Efficiency",
                        lifespan: "15 Years",
                        price: 10800
                    },
                    {
                        category: "Step Down Transformers",
                        title: "ROBOART Step Down 50KVA Industrial",
                        desc: "Massive scale step down transformer optimized for full factory line power conversion.",
                        badge: "Industrial Step Down",
                        badgeBg: "rgba(239, 68, 68, 0.1)",
                        badgeColor: "#ef4444",
                        icon: "fa-solid fa-industry",
                        autonomy: "50KVA Rating",
                        efficiency: "Aluminum Winding Option",
                        lifespan: "15 Years",
                        price: 115000
                    }
                ],
                lithium: [
                    {
                        category: "Isolation Transformers",
                        title: "ROBOART Medical Grade Isolation 3KVA",
                        desc: "Absolute electrical isolation tailored for hospital equipment and sensitive medical devices.",
                        badge: "Medical Safety",
                        badgeBg: "rgba(34, 197, 94, 0.1)",
                        badgeColor: "#22c55e",
                        icon: "fa-solid fa-heart-pulse",
                        autonomy: "3KVA Pure Isolation",
                        efficiency: "Zero Electrical Noise",
                        lifespan: "20 Years",
                        price: 32999
                    },
                    {
                        category: "Isolation Transformers",
                        title: "ROBOART Industrial Isolation 20KVA",
                        desc: "Eliminates neutral interference and ground loops in heavy machinery networks.",
                        badge: "CNC Safeguard",
                        badgeBg: "rgba(59, 130, 246, 0.1)",
                        badgeColor: "#3b82f6",
                        icon: "fa-solid fa-shield-halved",
                        autonomy: "20KVA Rating",
                        efficiency: "High Load Safety",
                        lifespan: "20 Years",
                        price: 84500
                    },
                    {
                        category: "Three Phase Transformers",
                        title: "ROBOART Three Phase Dry Type 100KVA",
                        desc: "Robust three phase distribution transformer for commercial buildings and factories.",
                        badge: "Power Distribution",
                        badgeBg: "rgba(168, 85, 247, 0.1)",
                        badgeColor: "#a855f7",
                        icon: "fa-solid fa-tower-broadcast",
                        autonomy: "100KVA Rating",
                        efficiency: "Low Loss Core",
                        lifespan: "25 Years",
                        price: 219000
                    },
                    {
                        category: "Three Phase Transformers",
                        title: "ROBOART Custom High Capacity 500KVA",
                        desc: "Fully custom built three phase power plant designed to exact site specifications.",
                        badge: "Custom Engineering",
                        badgeBg: "rgba(239, 68, 68, 0.1)",
                        badgeColor: "#ef4444",
                        icon: "fa-solid fa-plug-circle-check",
                        autonomy: "500KVA Rating",
                        efficiency: "Precision Windings",
                        lifespan: "25+ Years",
                        price: 850000
                    }
                ]
            };

            let productsDb = JSON.parse(localStorage.getItem("aura-b2c-products"));
            // Force reset to new DB if old ROBOART data exists (check via title)
            if (!productsDb || !productsDb.tubular[0] || productsDb.tubular[0].title.includes("ROBOART")) {
                productsDb = defaultDb;
                localStorage.setItem("aura-b2c-products", JSON.stringify(productsDb));
            }

            const tubularBtn = document.getElementById("btn-opt-tubular");
            const lithiumBtn = document.getElementById("btn-opt-lithium");
            const descLabel = document.getElementById("toggle-desc-label");
            const gridContainer = document.getElementById("b2c-catalog-grid");

            // Toggle handlers
            tubularBtn.addEventListener("click", () => {
                tubularBtn.classList.add("active");
                lithiumBtn.classList.remove("active");
                descLabel.textContent = "Control and Step Down transformers built for automation, CNC machines, and standard industrial reduction.";
                renderCatalog("tubular");
            });

            lithiumBtn.addEventListener("click", () => {
                lithiumBtn.classList.add("active");
                tubularBtn.classList.remove("active");
                descLabel.textContent = "Absolute electrical isolation and three phase distribution systems for heavy medical and commercial power grids.";
                renderCatalog("lithium");
            });

            // Dynamic Render Catalog Function
            function renderCatalog(optionKey) {
                gridContainer.innerHTML = "";
                const items = productsDb[optionKey];
                
                items.forEach(prod => {
                    const card = document.createElement("div");
                    card.className = "b2c-prod-card";
                    card.innerHTML = `
                        <div class="b2c-prod-badge" style="background: ${prod.badgeBg || 'rgba(var(--primary-rgb), 0.1)'}; color: ${prod.badgeColor || 'var(--primary)'};">
                            ${prod.badge}
                        </div>
                        <div class="b2c-prod-category-tag">${prod.category}</div>
                        <h4 class="b2c-prod-title">${prod.title}</h4>
                        
                        <!-- Illustration Icon box -->
                        <div class="b2c-prod-visual">
                            ${prod.image ? `<img src="${prod.image}" style="max-width: 100%; max-height: 100%; object-fit: contain; border-radius: 6px;">` : `<i class="${prod.icon}"></i>`}
                        </div>
                        
                        <p class="b2c-prod-desc">${prod.desc}</p>
                        
                        <!-- Spec Box -->
                        <div class="b2c-spec-meter-box">
                            <div class="b2c-spec-row">
                                <span>Estimated Autonomy:</span>
                                <strong>${prod.autonomy}</strong>
                            </div>
                            <div class="b2c-spec-row">
                                <span>Cell Lifespan:</span>
                                <strong>${prod.lifespan}</strong>
                            </div>
                            <div class="b2c-spec-row">
                                <span>System Efficiency:</span>
                                <strong>${prod.efficiency}</strong>
                            </div>
                        </div>

                        <!-- Price & Buy actions -->
                        <div class="b2c-price-box">
                            <div>
                                <span class="b2c-price">₹${prod.price.toLocaleString('en-IN')}</span>
                                <span class="b2c-price-subtext">All-Inclusive GST Price</span>
                            </div>
                            <button type="button" class="btn btn-primary b2c-btn-buy" onclick="handleQuickBuy('${prod.title}', ${prod.price})">
                                <span>Order Now</span>
                                <i class="fa-solid fa-cart-shopping"></i>
                            </button>
                        </div>
                    `;
                    gridContainer.appendChild(card);
                });
            }

            // Global quick buy routing handler
            window.handleQuickBuy = async (title, price) => {
                const isUserLoggedIn = localStorage.getItem("aura-user-logged-in") === "true";
                if (!isUserLoggedIn) {
                    alert("ROBOART Security Protocols: Please sign in as a Customer to place orders or request factory quotes!");
                    localStorage.setItem("aura-auth-redirect", "b2c-store.html");
                    window.location.href = "customer-login.html";
                    return;
                }

                window.location.href = `checkout.html?type=standard&item=${encodeURIComponent(title)}&price=${price}`;
            };

            // Render Default Option
            renderCatalog("tubular");
        });
    </script>
</body>
</html>
