<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wolter Admin Pro (v4.0 - FINAL STABLE)</title>
    
    <!-- FALLBACK LOADER KILLER -->
    <script>
        setTimeout(function() {
            var loader = document.getElementById('loader');
            if(loader) loader.classList.add('hidden');
        }, 3000);
        window.onerror = function(m, u, l) {
            console.error("Diagnostic:", m, "at", l);
        };
    </script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/appwrite@14.0.1"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --primary: #6366f1;
            --bg-deep: #020617;
            --glass: rgba(30, 41, 59, 0.4);
            --text: #f8fafc;
        }
        body {
            margin: 0;
            background: var(--bg-deep);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            display: flex;
            min-height: 100vh;
        }
        #loader {
            position: fixed;
            inset: 0;
            background: var(--bg-deep);
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.5s;
        }
        #loader.hidden { opacity: 0; pointer-events: none; }
        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(99, 102, 241, 0.2);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Sidebar & Layout */
        .sidebar { width: 260px; background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(10px); border-right: 1px solid rgba(255,255,255,0.05); padding: 20px; }
        .main-content { flex: 1; padding: 30px; overflow-y: auto; }
        .section { display: none; }
        .section.active { display: block; }
        .nav-link { 
            padding: 12px 16px; 
            border-radius: 12px; 
            color: #94a3b8; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            transition: 0.3s;
            margin-bottom: 5px;
        }
        .nav-link:hover, .nav-link.active { background: rgba(99, 102, 241, 0.1); color: #fff; }
        .glass-card { background: var(--glass); border: 1px solid rgba(255,255,255,0.05); border-radius: 20px; padding: 24px; }
        
        .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { text-align: center; }
        .stat-value { font-size: 2rem; font-weight: 800; color: var(--primary); }
    </style>
</head>
<body>

    <div id="loader"><div class="spinner"></div></div>

    <aside class="sidebar">
        <h2 style="color:var(--primary); margin-bottom:30px;">💊 Wolter Admin</h2>
        <nav>
            <div class="nav-link active" onclick="showSection('dash')"><i class="fas fa-th-large"></i> Dashboard</div>
            <div class="nav-link" onclick="showSection('team')"><i class="fas fa-users"></i> Team MR</div>
            <div class="nav-link" onclick="location.href='attendance.html'"><i class="fas fa-calendar"></i> Attendance</div>
            <div class="nav-link" onclick="doLogout()"><i class="fas fa-sign-out-alt"></i> Logout</div>
        </nav>
    </aside>

    <main class="main-content">
        <div id="dash" class="section active">
            <h1 style="margin-bottom:30px">Dashboard Overview</h1>
            <div class="stat-grid">
                <div class="glass-card stat-card">
                    <div style="color:#94a3b8; font-size:0.9rem">Total MRs</div>
                    <div class="stat-value" id="count-mrs">0</div>
                </div>
                <div class="glass-card stat-card">
                    <div style="color:#94a3b8; font-size:0.9rem">Total Doctors</div>
                    <div class="stat-value" id="count-docs">0</div>
                </div>
                <div class="glass-card stat-card">
                    <div style="color:#94a3b8; font-size:0.9rem">Orders Today</div>
                    <div class="stat-value" id="count-orders">0</div>
                </div>
            </div>
            
            <div class="glass-card">
                <h3>Sales Performance</h3>
                <canvas id="salesChart" style="max-height:300px"></canvas>
            </div>
        </div>

        <div id="team" class="section">
            <h1>Team Management</h1>
            <div class="glass-card">
                <div id="team-list">Loading Team...</div>
            </div>
        </div>
    </main>

    <script>
        const { Client, Account, Databases, Storage, Query, ID } = Appwrite;
        const client = new Client().setEndpoint('https://nyc.cloud.appwrite.io/v1').setProject('69fec2ae0012dadf853f');
        const account = new Account(client);
        const databases = new Databases(client);
        const DB_ID = '69ff3a310008961aa77d';

        function showSection(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            event.currentTarget.classList.add('active');
        }

        async function init() {
            try {
                const user = await account.get();
                loadData();
            } catch(e) { location.href = 'login.html'; }
        }

        async function loadData() {
            try {
                const [mrs, docs, orders] = await Promise.all([
                    databases.listDocuments(DB_ID, 'employees'),
                    databases.listDocuments(DB_ID, 'doctors'),
                    databases.listDocuments(DB_ID, 'orders')
                ]);

                document.getElementById('count-mrs').textContent = mrs.total;
                document.getElementById('count-docs').textContent = docs.total;
                document.getElementById('count-orders').textContent = orders.total;

                renderTeam(mrs.documents);
                renderChart(orders.documents);
                
                document.getElementById('loader').classList.add('hidden');
            } catch(e) { 
                console.error(e);
                document.getElementById('loader').classList.add('hidden');
            }
        }

        function renderTeam(mrs) {
            const html = mrs.map(m => `
                <div style="padding:15px; border-bottom:1px solid rgba(255,255,255,0.05); display:flex; justify-content:space-between; align-items:center">
                    <div>
                        <div style="font-weight:700">${m.name}</div>
                        <div style="font-size:0.8rem; color:#94a3b8">${m.email}</div>
                    </div>
                    <div style="color:${m.isApproved ? '#10b981' : '#f43f5e'}">${m.isApproved ? 'Approved' : 'Pending'}</div>
                </div>
            `).join('');
            document.getElementById('team-list').innerHTML = html || 'No team members found.';
        }

        function renderChart(orders) {
            const ctx = document.getElementById('salesChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: orders.slice(-7).map(o => new Date(o.$createdAt).toLocaleDateString()),
                    datasets: [{
                        label: 'Orders',
                        data: orders.slice(-7).map(o => parseInt(o.amount) || 0),
                        borderColor: '#6366f1',
                        tension: 0.4
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });
        }

        async function doLogout() {
            await account.deleteSession('current');
            location.href = 'login.html';
        }

        init();
    </script>
</body>
</html>
