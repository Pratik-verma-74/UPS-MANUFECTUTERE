<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Attendance - Wolter Pro</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #3B82F6;
      --accent: #8B5CF6;
      --success: #10B981;
      --danger: #EF4444;
      --warning: #F59E0B;
      --bg-deep: #020617;
      --glass: rgba(255, 255, 255, 0.03);
      --glass-border: rgba(255, 255, 255, 0.08);
      --text-dim: #94A3B8;
    }

    * { box-sizing: border-box; margin: 0; padding: 0 }
    body { 
      font-family: 'DM Sans', sans-serif; 
      background: radial-gradient(circle at 0% 0%, rgba(59, 130, 246, 0.08) 0%, transparent 40%), var(--bg-deep);
      color: #F8FAFC;
      min-height: 100vh;
      overflow-x: hidden;
    }

    .glass { background: var(--glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: 24px; }
    
    /* SIDEBAR */
    .sidebar-overlay { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(4px); z-index: 600; display: none; }
    .sidebar-overlay.open { display: block; }
    .sidebar { position: fixed; top: 0; left: 0; height: 100vh; width: 280px; background: rgba(6, 10, 25, 0.98); backdrop-filter: blur(30px); border-right: 1px solid var(--glass-border); z-index: 700; transform: translateX(-100%); transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
    .sidebar.open { transform: translateX(0) }
    .sidebar-nav-item { display: flex; align-items: center; gap: 12px; padding: 14px 20px; color: var(--text-dim); text-decoration: none; border-radius: 12px; margin: 4px 12px; transition: 0.3s; font-size: 0.9rem; }
    .sidebar-nav-item:hover { background: rgba(255, 255, 255, 0.05); color: white; }
    .sidebar-nav-item.active { background: rgba(59, 130, 246, 0.1); color: var(--primary); font-weight: 700; }

    /* HEADER */
    .header { padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; background: rgba(2, 6, 23, 0.8); backdrop-filter: blur(10px); border-bottom: 1px solid var(--glass-border); }
    .logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.4rem; background: linear-gradient(135deg, #60A5FA, #A78BFA); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }

    /* MAIN */
    main { padding: 24px 20px; max-width: 800px; margin: 0 auto; }
    .hero-card { padding: 40px 32px; text-align: center; margin-bottom: 24px; position: relative; overflow: hidden; animation: fadeIn 0.8s ease; }
    
    @keyframes fadeIn { from { opacity:0; transform: translateY(10px); } to { opacity:1; transform: translateY(0); } }

    .status-pill { display: inline-flex; align-items: center; gap: 8px; padding: 6px 16px; border-radius: 30px; font-size: 0.7rem; font-weight: 800; text-transform: uppercase; margin-bottom: 20px; letter-spacing: 1px; }
    .status-absent { background: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1px solid rgba(239, 68, 68, 0.2); }
    .status-present { background: rgba(16, 185, 129, 0.1); color: var(--success); border: 1px solid rgba(16, 185, 129, 0.2); }
    .status-late { background: rgba(245, 158, 11, 0.1); color: var(--warning); border: 1px solid rgba(245, 158, 11, 0.2); }

    .time-display { font-family: 'Syne', sans-serif; font-size: 3.5rem; font-weight: 800; margin-bottom: 8px; line-height: 1; letter-spacing: -2px; }
    .date-display { color: var(--text-dim); font-size: 0.95rem; margin-bottom: 32px; font-weight: 500; }

    .btn-main { width: 100%; padding: 18px; border-radius: 20px; border: none; font-size: 1.1rem; font-weight: 800; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 12px; font-family: 'Syne', sans-serif; }
    .btn-in { background: linear-gradient(135deg, #10B981, #059669); color: white; box-shadow: 0 10px 25px rgba(16, 185, 129, 0.3); }
    .btn-out { background: linear-gradient(135deg, #EF4444, #DC2626); color: white; box-shadow: 0 10px 25px rgba(239, 68, 68, 0.3); }
    .btn-main:hover { transform: translateY(-3px); filter: brightness(1.1); }
    .btn-main:active { transform: translateY(0); }

    .stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 32px; }
    .stat-box { padding: 20px; text-align: center; }
    .stat-num { font-family: 'Syne', sans-serif; font-size: 2rem; font-weight: 800; color: var(--primary); }
    .stat-txt { font-size: 0.65rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1.5px; margin-top: 6px; font-weight: 700; }

    .history-item { display: flex; justify-content: space-between; align-items: center; padding: 18px 24px; margin-bottom: 12px; transition: 0.3s; }
    .history-item:hover { background: rgba(255, 255, 255, 0.06); border-color: var(--primary); }
    .hist-date { font-weight: 700; font-size: 0.95rem; margin-bottom: 2px; }
    .hist-time { font-size: 0.75rem; color: var(--text-dim); }

    /* LOADER */
    #loader { position: fixed; inset: 0; background: var(--bg-deep); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.5s; }
    .spinner { width: 40px; height: 40px; border: 3px solid rgba(59, 130, 246, 0.1); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s infinite linear; }
    @keyframes spin { to { transform: rotate(360deg) } }
    .hidden { display: none !important; opacity: 0; }

    .form-control { width: 100%; padding: 14px; background: rgba(255, 255, 255, 0.04); border: 1px solid var(--glass-border); border-radius: 16px; color: white; font-family: inherit; margin-top: 12px; outline: none; transition: 0.3s; }
    .form-control:focus { border-color: var(--primary); background: rgba(255, 255, 255, 0.07); }

    .admin-panel { margin-top: 40px; border-top: 1px dashed var(--glass-border); padding-top: 40px; }
    .admin-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    .admin-table th { text-align: left; padding: 12px; font-size: 0.65rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }
    .admin-table td { padding: 14px 12px; font-size: 0.85rem; border-top: 1px solid var(--glass-border); }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 10px; }
  </style>
</head>
<body>
  <div id="loader"><div class="spinner"></div><p style="margin-top:20px; color:var(--text-dim); font-size:0.8rem; letter-spacing:1px">SYNCING ATTENDANCE</p></div>

  <div class="sidebar-overlay" id="overlay" onclick="toggleSidebar()"></div>
  <aside class="sidebar" id="sidebar">
    <div style="padding:40px 24px">
      <div class="logo" style="margin-bottom:40px">💊 Wolter Pro</div>
      <nav>
        <a href="mr.html" class="sidebar-nav-item"><i class="fas fa-home"></i> Dashboard</a>
        <a href="attendance.html" class="sidebar-nav-item active"><i class="fas fa-calendar-check"></i> Attendance</a>
        <a href="mr.html#page-doctors" class="sidebar-nav-item"><i class="fas fa-user-md"></i> Doctors</a>
        <a href="mr.html#page-orders" class="sidebar-nav-item"><i class="fas fa-shopping-bag"></i> Orders</a>
        <a href="expense.html" class="sidebar-nav-item"><i class="fas fa-wallet"></i> Expenses</a>
      </nav>
      <div style="position:absolute; bottom:30px; width:calc(100% - 48px)">
        <button class="btn-main" style="background:rgba(239, 68, 68, 0.1); color:var(--danger); font-size:0.85rem; padding:12px" onclick="doLogout()">
          <i class="fas fa-sign-out-alt"></i> Logout
        </button>
      </div>
    </div>
  </aside>

  <header class="header">
    <button style="background:var(--glass); border:1px solid var(--glass-border); color:white; width:40px; height:40px; border-radius:12px; cursor:pointer" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
    <div class="logo">Attendance</div>
    <div id="header-date" style="font-size:0.75rem; color:var(--primary); font-weight:700; background:rgba(59,130,246,0.1); padding:4px 12px; border-radius:20px"></div>
  </header>

  <main>
    <div class="glass hero-card">
      <div id="today-status" class="status-pill status-absent"><i class="fas fa-circle"></i> Not Marked</div>
      <div class="time-display" id="live-clock">00:00:00</div>
      <div class="date-display" id="full-date">Loading date...</div>

      <button id="btn-checkin" class="btn-main btn-in" onclick="doCheckIn()">
        <i class="fas fa-fingerprint"></i> Check-In Now
      </button>

      <div id="checkout-area" class="hidden">
        <div style="text-align:left; margin-bottom:24px">
          <label style="font-size:0.65rem; color:var(--text-dim); text-transform:uppercase; font-weight:800; letter-spacing:1px">Daily Field Summary</label>
          <input type="number" id="doc-count" class="form-control" placeholder="Doctors visited today">
          <textarea id="remarks" class="form-control" style="height:80px; resize:none" placeholder="Add any field notes or remarks..."></textarea>
        </div>
        <button class="btn-main btn-out" onclick="doCheckOut()">
          <i class="fas fa-power-off"></i> Finish Day (Check-Out)
        </button>
      </div>
    </div>

    <div class="stats-row">
      <div class="glass stat-box"><div class="stat-num" id="stat-present">0</div><div class="stat-txt">Days Present</div></div>
      <div class="glass stat-box"><div class="stat-num" id="stat-late" style="color:var(--warning)">0</div><div class="stat-txt">Late Entries</div></div>
    </div>

    <h3 style="font-family:Syne; font-size:1.2rem; margin-bottom:20px; display:flex; align-items:center; gap:10px">
      <i class="fas fa-history" style="color:var(--primary); font-size:1rem"></i> Recent Logs
    </h3>
    <div id="history-list">
      <!-- Injected by JS -->
    </div>

    <!-- ADMIN PANEL -->
    <div id="admin-view" class="hidden admin-panel">
      <h3 style="font-family:Syne; margin-bottom:20px">Admin Oversight</h3>
      <div class="glass" style="padding:24px; margin-bottom:24px">
        <label class="stat-txt" style="display:block; margin-bottom:8px">Filter by MR</label>
        <select id="admin-mr-select" class="form-control" style="margin:0" onchange="loadAdminAttendance()">
          <option value="">All Staff Members</option>
        </select>
      </div>
      <div class="glass" style="overflow-x:auto; padding:0 20px">
        <table class="admin-table">
          <thead>
            <tr>
              <th>Staff</th>
              <th>Date</th>
              <th>In/Out</th>
              <th>Status</th>
              <th>Map</th>
            </tr>
          </thead>
          <tbody id="admin-history-body"></tbody>
        </table>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/appwrite@14.0.0/dist/iife/sdk.min.js"></script>
  <script>
    const { Client, Account, Databases, Query, ID } = Appwrite;
    const client = new Client().setEndpoint('https://nyc.cloud.appwrite.io/v1').setProject('69fec2ae0012dadf853f');
    const account = new Account(client);
    const databases = new Databases(client);
    const DB_ID = '69ff3a310008961aa77d';
    const COL_ATT = 'attendance';
    const COL_EMP = 'employees';

    let user = null;
    let uid = '';
    let userRole = 'MR';
    let todayRec = null;

    async function init() {
      try {
        user = await account.get();
        uid = user.email.replace(/[@.]/g, '-');
        
        try {
          const emp = await databases.getDocument(DB_ID, COL_EMP, uid);
          userRole = emp.role || 'MR';
        } catch(e) {
          if(user.email === 'pratikverma025@gmail.com') userRole = 'Admin';
        }

        updateClock();
        setInterval(updateClock, 1000);
        
        await fetchToday();
        await fetchHistory();

        if(userRole === 'Admin' || user.email === 'pratikverma025@gmail.com') {
          document.getElementById('admin-view').classList.remove('hidden');
          await fetchMRs();
          await fetchAllAttendance();
        }
        
        document.getElementById('loader').classList.add('hidden');
      } catch (e) { window.location.href = 'login.html'; }
    }

    function updateClock() {
      const now = new Date();
      document.getElementById('live-clock').textContent = now.toLocaleTimeString('en-US', { hour12: false });
      document.getElementById('full-date').textContent = now.toLocaleDateString('en-US', { weekday: 'long', day: 'numeric', month: 'long' });
      document.getElementById('header-date').textContent = now.toLocaleDateString('en-US', { day: 'numeric', month: 'short' });
    }

    async function fetchToday() {
      const date = new Date().toISOString().split('T')[0];
      const res = await databases.listDocuments(DB_ID, COL_ATT, [Query.equal('userId', uid), Query.equal('date', date)]);
      if (res.documents.length > 0) {
        todayRec = res.documents[0];
        document.getElementById('btn-checkin').classList.add('hidden');
        document.getElementById('today-status').className = 'status-pill status-present';
        document.getElementById('today-status').innerHTML = '<i class="fas fa-check-circle"></i> Checked-In';
        if (!todayRec.checkOutTime) {
          document.getElementById('checkout-area').classList.remove('hidden');
        } else {
          document.getElementById('today-status').innerHTML = '<i class="fas fa-flag-checkered"></i> Day Completed';
          document.getElementById('checkout-area').innerHTML = `<p style="color:var(--text-dim); font-size:0.85rem; margin-top:20px; text-align:center">Checked out at <b>${todayRec.checkOutTime}</b></p>`;
          document.getElementById('checkout-area').classList.remove('hidden');
        }
      }
    }

    async function doCheckIn() {
      const now = new Date();
      const status = (now.getHours() > 10 || (now.getHours() === 10 && now.getMinutes() > 30)) ? 'Late' : 'Present';
      document.getElementById('loader').classList.remove('hidden');
      try {
        let loc = "Unknown Location";
        if (navigator.geolocation) {
          const p = await new Promise(r => navigator.geolocation.getCurrentPosition(r, () => r(null), {timeout:5000}));
          if (p) loc = `${p.coords.latitude.toFixed(4)}, ${p.coords.longitude.toFixed(4)}`;
        }
        await databases.createDocument(DB_ID, COL_ATT, ID.unique(), {
          userId: uid, mrName: user.name, date: now.toISOString().split('T')[0],
          checkInTime: now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}),
          status: status, location: loc, createdAt: now.toISOString()
        });
        location.reload();
      } catch (e) { alert("Error: " + e.message); document.getElementById('loader').classList.add('hidden'); }
    }

    async function doCheckOut() {
      const now = new Date();
      document.getElementById('loader').classList.remove('hidden');
      try {
        await databases.updateDocument(DB_ID, COL_ATT, todayRec.$id, {
          checkOutTime: now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}),
          doctorCount: parseInt(document.getElementById('doc-count').value) || 0,
          remarks: document.getElementById('remarks').value
        });
        location.reload();
      } catch (e) { alert("Error: " + e.message); document.getElementById('loader').classList.add('hidden'); }
    }

    async function fetchHistory() {
      const res = await databases.listDocuments(DB_ID, COL_ATT, [Query.equal('userId', uid), Query.orderDesc('date'), Query.limit(10)]);
      document.getElementById('history-list').innerHTML = res.documents.map(d => `
        <div class="glass history-item">
          <div>
            <div class="hist-date">${d.date}</div>
            <div class="hist-time">${d.checkInTime} - ${d.checkOutTime || 'Active'}</div>
          </div>
          <div class="status-pill status-${d.status.toLowerCase()}" style="margin:0; padding:4px 12px; font-size:0.6rem">${d.status}</div>
        </div>
      `).join('');
      document.getElementById('stat-present').textContent = res.documents.length;
      document.getElementById('stat-late').textContent = res.documents.filter(d => d.status === 'Late').length;
    }

    async function fetchMRs() {
      try {
        const res = await databases.listDocuments(DB_ID, COL_EMP, [Query.equal('role', 'mr')]);
        const select = document.getElementById('admin-mr-select');
        res.documents.forEach(mr => {
          const opt = document.createElement('option');
          opt.value = mr.email.replace(/[@.]/g, '-');
          opt.textContent = mr.name || mr.email;
          select.appendChild(opt);
        });
      } catch(e) {}
    }

    async function fetchAllAttendance() {
      try {
        const res = await databases.listDocuments(DB_ID, COL_ATT, [Query.orderDesc('date'), Query.limit(30)]);
        renderAdminTable(res.documents);
      } catch(e) {}
    }

    function renderAdminTable(docs) {
      document.getElementById('admin-history-body').innerHTML = docs.map(doc => `
        <tr>
          <td><b style="color:var(--primary)">${doc.mrName || 'User'}</b></td>
          <td>${doc.date}</td>
          <td style="font-size:0.7rem">${doc.checkInTime} - ${doc.checkOutTime || '--'}</td>
          <td><span class="status-pill status-${doc.status.toLowerCase()}" style="margin:0; padding:2px 8px; font-size:0.55rem">${doc.status}</span></td>
          <td>
            ${doc.location && doc.location !== 'Unknown Location' ? 
              `<a href="https://www.google.com/maps?q=${doc.location}" target="_blank" style="color:var(--primary)"><i class="fas fa-map-marker-alt"></i> View</a>` : 
              '<span style="color:var(--text-dim); font-size:0.7rem">N/A</span>'}
          </td>
        </tr>
      `).join('');
    }

    async function loadAdminAttendance() {
      const u = document.getElementById('admin-mr-select').value;
      if(!u) return fetchAllAttendance();
      const res = await databases.listDocuments(DB_ID, COL_ATT, [Query.equal('userId', u), Query.orderDesc('date')]);
      renderAdminTable(res.documents);
    }

    function toggleSidebar() { 
      document.getElementById('sidebar').classList.toggle('open');
      document.getElementById('overlay').classList.toggle('open');
    }
    function doLogout() { account.deleteSession('current').then(() => window.location.href='login.html'); }
    init();
  </script>
</body>
</html>
