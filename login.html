<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Wolter Pharma</title>
    <!-- SECURITY HEADERS -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' https: 'unsafe-inline' 'unsafe-eval'; img-src 'self' data: https:; font-src 'self' https: data:;">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #3B82F6;
            --accent: #8B5CF6;
            --text-primary: #F1F5F9;
            --text-secondary: #94A3B8;
            --bg-deep: #060D1A;
            --glass-card: rgba(255,255,255,0.06);
            --glass-border: rgba(255,255,255,0.10);
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: radial-gradient(circle at top right, rgba(59,130,246,0.15), transparent), var(--bg-deep);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
        }

        .login-card {
            background: var(--glass-card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            padding: 40px;
            border-radius: 28px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .logo {
            font-family: 'Syne', sans-serif;
            font-size: 2.2rem;
            font-weight: 800;
            display: block;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            color: var(--primary);
            margin-bottom: 30px;
        }

        .form-group { margin-bottom: 20px; text-align: left; }
        .form-label { display: block; font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em; }
        .form-control {
            width: 100%; padding: 12px 16px; background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border); border-radius: 12px; color: #fff;
            outline: none; transition: 0.3s; box-sizing: border-box;
        }
        .form-control:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15); }

        .btn {
            width: 100%; padding: 12px; border-radius: 12px; border: none;
            font-weight: 600; cursor: pointer; transition: 0.3s; font-family: 'DM Sans', sans-serif;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            box-sizing: border-box;
        }
        .btn-primary { background: linear-gradient(135deg, var(--primary), var(--accent)); color: #fff; margin-bottom: 12px; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3); }

        .btn-outline { background: transparent; border: 1px solid var(--glass-border); color: #fff; }
        .btn-outline:hover { background: rgba(255,255,255,0.05); border-color: var(--primary); }

        .divider { margin: 24px 0; display: flex; align-items: center; color: var(--text-secondary); font-size: 0.8rem; }
        .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: var(--glass-border); margin: 0 10px; }

        #loader.hidden { display: none; }
        #auth-controls.hidden { display: none; }
        
        .alert { padding: 12px; border-radius: 10px; font-size: 0.85rem; margin-top: 15px; display: none; }
        .alert-error { background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.2); }
        .alert-success { background: rgba(16, 185, 129, 0.1); color: #10B981; border: 1px solid rgba(16, 185, 129, 0.2); }

        .toggle-auth { margin-top: 20px; font-size: 0.9rem; color: var(--text-secondary); }
        .toggle-auth span { color: var(--primary); cursor: pointer; font-weight: 600; text-decoration: underline; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">💊 Wolter Pharma</div>
        
        <div id="loader" class="hidden">
            <i class="fas fa-spinner fa-spin fa-2x"></i>
            <p style="margin-top: 15px; color: var(--text-secondary);">Connecting to Wolter Cloud...</p>
        </div>

        <div id="auth-controls">
            <div id="login-form">
                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <input type="email" id="email" class="form-control" placeholder="name@example.com">
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="••••••••">
                </div>
                <button id="email-login-btn" class="btn btn-primary">Login</button>
            </div>

            <div class="divider">OR</div>
            
            <button id="google-login-btn" class="btn btn-outline">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" width="18" alt="Google">
                Continue with Google
            </button>

            <div class="toggle-auth" id="auth-toggle-text">
                Don't have an account? <span onclick="toggleAuthMode()">Sign Up</span>
            </div>
        </div>

        <div id="error-alert" class="alert alert-error"></div>
        <div id="success-alert" class="alert alert-success"></div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
