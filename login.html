<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Wolter Pharma (v4.3 - CACHE KILLER)</title>
    <script>
        // NUCLEAR CACHE KILLER
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function(registrations) {
                for(let registration of registrations) { registration.unregister(); }
            });
        }
        console.log("Wolter Auth v4.3 - Service Workers Cleared");
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/appwrite@14.0.1"></script>
    <script>
        // WOLTER CYBER-SHIELD v5.0
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.onkeydown = function(e) {
            if (e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 'I'.charCodeAt(0) || e.keyCode == 'J'.charCodeAt(0) || e.keyCode == 'C'.charCodeAt(0))) || (e.ctrlKey && e.keyCode == 'U'.charCodeAt(0))) {
                return false;
            }
        };
        setInterval(function() { debugger; }, 100);
    </script>
    <style>
        :root {
            --primary: #3B82F6;
            --bg-deep: #060D1A;
            --glass-card: rgba(255,255,255,0.06);
        }
        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg-deep);
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }
        .login-card {
            background: var(--glass-card);
            backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 28px;
            width: 100%;
            max-width: 380px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .form-group { margin-bottom: 20px; text-align: left; }
        .form-label { display: block; font-size: 0.8rem; color: #94A3B8; margin-bottom: 8px; }
        .form-control {
            width: 100%; padding: 12px; background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: #fff;
            box-sizing: border-box;
        }
        .btn {
            width: 100%; padding: 12px; border-radius: 12px; border: none;
            font-weight: 600; cursor: pointer; transition: 0.3s;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-primary { background: var(--primary); color: #fff; margin-bottom: 12px; }
        .btn-outline { background: transparent; border: 1px solid rgba(255,255,255,0.1); color: #fff; }
        .hidden { display: none; }
        #error-alert { color: #f43f5e; margin-top: 15px; font-size: 0.85rem; display: none; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2 style="margin-bottom:10px">💊 Wolter</h2>
        <p style="color:#94A3B8; margin-bottom:30px; font-size:0.9rem">Access Wolter Cloud</p>

        <div id="loader" class="hidden">
            <i class="fas fa-spinner fa-spin fa-2x"></i>
            <p>Authenticating...</p>
        </div>

        <div id="auth-controls">
            <div class="form-group">
                <label class="form-label">Email</label>
                <input type="email" id="email" class="form-control" placeholder="name@wolter.com">
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" id="password" class="form-control" placeholder="••••••••">
            </div>
            <button onclick="handleLogin()" class="btn btn-primary">Login</button>
            
            <div style="margin:20px 0; color:#475569">OR</div>

            <button onclick="handleGoogle()" class="btn btn-outline">
                <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/google/google-original.svg" width="18">
                Continue with Google
            </button>
        </div>

        <div id="error-alert"></div>
    </div>

    <script>
        const { Client, Account, Databases, ID } = Appwrite;
        const client = new Client().setEndpoint('https://nyc.cloud.appwrite.io/v1').setProject('69fec2ae0012dadf853f');
        const account = new Account(client);
        const databases = new Databases(client);

        async function init() {
            try {
                const user = await account.get();
                redirect(user);
            } catch(e) {}
        }

        async function handleLogin() {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            if(!email || !pass) return alert("Enter credentials");
            
            toggleLoad(true);
            try {
                await account.createEmailPasswordSession(email, pass);
                const user = await account.get();
                redirect(user);
            } catch(e) { 
                alert(e.message);
                toggleLoad(false);
            }
        }

        function handleGoogle() {
            toggleLoad(true);
            const url = window.location.href.split('?')[0].split('#')[0];
            account.createOAuth2Session('google', url, url);
        }

        async function redirect(user) {
            console.log("[Login] Redirecting user: " + user.email);
            const uid = user.email.replace(/[@.]/g, '-');
            const superAdmins = ['pratikverma025@gmail.com', 'wolterpharma@gmail.com', 'admin.wolter@gmail.com'];
            
            let isAdmin = superAdmins.includes(user.email);
            
            if(!isAdmin) {
                try {
                    const emp = await databases.getDocument('69ff3a310008961aa77d', 'employees', uid);
                    if(emp.role === 'Admin') isAdmin = true;
                } catch(e) {}
            }

            if(isAdmin) {
                const path = window.location.pathname.includes('samir-app') ? '/samir-app/admin.html' : '/admin.html';
                location.href = path;
            } else {
                const path = window.location.pathname.includes('samir-app') ? '/samir-app/dashboard.html' : '/dashboard.html';
                location.href = path;
            }
        }

        function toggleLoad(show) {
            document.getElementById('loader').classList.toggle('hidden', !show);
            document.getElementById('auth-controls').classList.toggle('hidden', show);
        }

        init();
    </script>
</body>
</html>
