<!DOCTYPE html>
<html lang="en" data-theme="normal">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURA | Secure Admin Login</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Main Style Sheet -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-body">

    <div class="hero-bg-grid"></div>
    <div class="hero-glow"></div>

    <!-- Login Container -->
    <div class="login-container">
        <!-- Back to Storefront Link -->
        <a href="index.html" class="back-link"><i class="fa-solid fa-arrow-left-long"></i> Back to Storefront</a>

        <div class="login-card glass border">
            <div class="login-header">
                <i class="fa-solid fa-bolt login-card-icon"></i>
                <h2>AURA PORTAL</h2>
                <p>Authenticate system credentials to access admin dashboard.</p>
            </div>

            <!-- Form -->
            <form id="login-form" class="lead-form">
                <div class="form-group">
                    <label for="login-email"><i class="fa-solid fa-user-shield"></i> Username or Admin Email</label>
                    <input type="text" id="login-email" required placeholder="Type 'admin'" autocomplete="off">
                </div>
                
                <div class="form-group">
                    <label for="login-password"><i class="fa-solid fa-lock"></i> Password</label>
                    <div class="pass-input-wrapper">
                        <input type="password" id="login-password" required placeholder="Type 'admin123'">
                        <button type="button" id="pass-toggle" class="pass-toggle-btn"><i class="fa-solid fa-eye"></i></button>
                    </div>
                </div>

                <!-- Error Display Toast -->
                <div id="login-error" class="login-error-box">
                    <i class="fa-solid fa-circle-exclamation"></i>
                    <span>Invalid credentials. Access Denied.</span>
                </div>

                <div class="form-helpers">
                    <label class="remember-me">
                        <input type="checkbox" id="remember">
                        <span>Remember credentials</span>
                    </label>
                </div>

                <button type="submit" class="btn btn-primary w-full">
                    <span>Secure Sign In</span>
                    <i class="fa-solid fa-shield-halved"></i>
                </button>
            </form>
        </div>
    </div>

    <!-- Script specifically for Login authentication flow -->
    <script>
        (function() {
            // Theme setup
            const htmlElement = document.documentElement;
            const savedTheme = localStorage.getItem("aura-theme") || "normal";
            htmlElement.setAttribute("data-theme", savedTheme);

            const loginForm = document.getElementById("login-form");
            const emailInput = document.getElementById("login-email");
            const passInput = document.getElementById("login-password");
            const errorBox = document.getElementById("login-error");
            const passToggle = document.getElementById("pass-toggle");

            // Password Toggle safe guard
            if (passToggle && passInput) {
                passToggle.addEventListener("click", () => {
                    const isPass = passInput.getAttribute("type") === "password";
                    passInput.setAttribute("type", isPass ? "text" : "password");
                    const icon = passToggle.querySelector("i");
                    if (icon) {
                        icon.className = isPass ? "fa-solid fa-eye-slash" : "fa-solid fa-eye";
                    }
                });
            }

            // Login check safe guard & clean URLs resolution
            if (loginForm && emailInput && passInput) {
                loginForm.addEventListener("submit", (e) => {
                    e.preventDefault();
                    
                    const email = emailInput.value.trim().toLowerCase();
                    const password = passInput.value;

                    // Simple admin verification credentials as requested
                    if (email === "admin" && password === "admin123") {
                        localStorage.setItem("aura-admin-logged-in", "true");
                        alert("Secure Admin session authenticated successfully!");
                        window.location.href = "admin.html";
                    } 
                    // Cross-portal support for Customer login on Admin page to prevent confusion
                    else if (email === "user@aura.com" && password === "user123") {
                        localStorage.setItem("aura-user-logged-in", "true");
                        localStorage.setItem("aura-user-email", email);
                        alert("Customer session authenticated successfully!");
                        window.location.href = "index.html";
                    } else {
                        if (errorBox) {
                            errorBox.classList.add("show");
                            setTimeout(() => errorBox.classList.remove("show"), 4000);
                        }
                    }
                });
            }
        })();
    </script>
</body>
</html>
